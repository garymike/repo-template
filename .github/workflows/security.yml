name: Security

on:
  # Scan pushes to the default branch + every PR. Feature-branch pushes are
  # already covered by their PR, so scanning every branch push too
  # (branches: ["**"]) double-bills Actions minutes on private repos. Public
  # repos have free Actions and may broaden to branches: ["**"] if they want
  # direct-push coverage on branches that never open a PR.
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

# Cancel superseded runs on the same ref (rapid pushes / PR updates).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/security-scan.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 # v1.3.0
    secrets: inherit

  gha-security:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/gha-security.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 # v1.3.0
    secrets: inherit

  sast:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/sast.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 # v1.3.0
    secrets: inherit

  iac-security:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/iac-security.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 # v1.3.0
    secrets: inherit

  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: garymike/security-workflows/.github/workflows/security-audit.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 # v1.3.0
    secrets: inherit

  # Optional opt-ins:
  #   CodeQL — enable GitHub code-scanning "default setup" (Settings -> Code security),
  #   or call codeql.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 with `languages:` set.
  #   skill-audit.yml@e794b2ea1799e1e7414cdbd7d8ef489c1f3820f0 — for repos shipping agent skills.
